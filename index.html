<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENGMart — Login</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f1eb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
  }
  .logo {
    text-align: center;
    margin-bottom: 1.8rem;
  }
  .logo h1 {
    font-size: 2.2rem;
    font-weight: 800;
    color: #1a3a1a;
    letter-spacing: -1px;
  }
  .logo h1 span { color: #2d7a2d; }
  .logo p { color: #888; font-size: .9rem; margin-top: .3rem; }
  .tabs {
    display: flex;
    background: #f4f1eb;
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 1.8rem;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: .6rem;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: .9rem;
    color: #888;
    transition: all .2s;
  }
  .tab.active {
    background: #fff;
    color: #1a3a1a;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .form { display: none; }
  .form.active { display: block; }
  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: .85rem;
    font-weight: 600;
    color: #444;
    margin-bottom: .4rem;
  }
  .field input {
    width: 100%;
    padding: .75rem 1rem;
    border: 1.5px solid #e0ddd6;
    border-radius: 8px;
    font-size: .95rem;
    outline: none;
    transition: border .2s;
    background: #faf9f7;
  }
  .field input:focus { border-color: #2d7a2d; background: #fff; }
  .btn-main {
    width: 100%;
    padding: .85rem;
    background: #2d7a2d;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: .5rem;
    transition: background .2s;
  }
  .btn-main:hover { background: #1a6b3c; }
  .btn-main:disabled { background: #aaa; cursor: not-allowed; }
  .error {
    background: #fff0f0;
    color: #c0392b;
    border: 1px solid #f5c6cb;
    border-radius: 6px;
    padding: .7rem 1rem;
    font-size: .85rem;
    margin-bottom: 1rem;
    display: none;
  }
  .success {
    background: #f0fff4;
    color: #1a6b3c;
    border: 1px solid #b7ebc8;
    border-radius: 6px;
    padding: .7rem 1rem;
    font-size: .85rem;
    margin-bottom: 1rem;
    display: none;
  }
  .divider {
    text-align: center;
    color: #bbb;
    font-size: .8rem;
    margin: 1.2rem 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 42%;
    height: 1px;
    background: #e0ddd6;
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .footer-note {
    text-align: center;
    font-size: .8rem;
    color: #aaa;
    margin-top: 1.5rem;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>ENG<span>Mart</span></h1>
    <p>Your African & Asian grocery store</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('signup')">Create Account</div>
  </div>

  <!-- Login Form -->
  <div class="form active" id="loginForm">
    <div class="error" id="loginError"></div>
    <div class="success" id="loginSuccess"></div>
    <div class="field">
      <label>Email address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password">
    </div>
    <button class="btn-main" id="loginBtn" onclick="doLogin()">Login</button>
  </div>

  <!-- Signup Form -->
  <div class="form" id="signupForm">
    <div class="error" id="signupError"></div>
    <div class="success" id="signupSuccess"></div>
    <div class="field">
      <label>Full name</label>
      <input type="text" id="signupName" placeholder="Your full name">
    </div>
    <div class="field">
      <label>Email address</label>
      <input type="email" id="signupEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="At least 6 characters">
    </div>
    <button class="btn-main" id="signupBtn" onclick="doSignup()">Create Account</button>
  </div>

  <div class="footer-note">ENGMart v1.0 &copy; 2025</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9e3swun1CnyJtBbpbVmY5HWxVhFsBHNw",
  authDomain: "engmart-f5fc4.firebaseapp.com",
  projectId: "engmart-f5fc4",
  storageBucket: "engmart-f5fc4.firebasestorage.app",
  messagingSenderId: "394910887689",
  appId: "1:394910887689:web:f0da37d8f1accdbe6e6dd8"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const ADMIN_EMAIL = "seguntoriola25@gmail.com";

// If already logged in, redirect straight away
auth.onAuthStateChanged(user => {
  if (user) {
    redirect(user);
  }
});

function redirect(user) {
  if (user.email === ADMIN_EMAIL) {
    window.location.href = 'engmart_admin.html';
  } else {
    window.location.href = 'engmart_store.html';
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('loginForm').classList.toggle('active', tab==='login');
  document.getElementById('signupForm').classList.toggle('active', tab==='signup');
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
function hideMessages(prefix) {
  document.getElementById(prefix+'Error').style.display = 'none';
  document.getElementById(prefix+'Success').style.display = 'none';
}

async function doLogin() {
  hideMessages('login');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('loginError', 'Please enter your email and password.'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const cred = await auth.signInWithEmailAndPassword(email, password);
    redirect(cred.user);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Login';
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/too-many-requests': 'Too many attempts. Try again later.'
    };
    showError('loginError', msgs[e.code] || e.message);
  }
}

async function doSignup() {
  hideMessages('signup');
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (!name || !email || !password) { showError('signupError', 'Please fill in all fields.'); return; }
  if (password.length < 6) { showError('signupError', 'Password must be at least 6 characters.'); return; }
  if (email === ADMIN_EMAIL) { showError('signupError', 'This email cannot be used for customer signup.'); return; }
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    await cred.user.updateProfile({ displayName: name });
    redirect(cred.user);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Create Account';
    const msgs = {
      'auth/email-already-in-use': 'An account with this email already exists.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/weak-password': 'Password is too weak.'
    };
    showError('signupError', msgs[e.code] || e.message);
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('loginForm').classList.contains('active')) doLogin();
    else doSignup();
  }
});
</script>
</body>
</html>
